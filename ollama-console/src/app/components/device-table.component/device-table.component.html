<p-table
  #dt
  [value]="devices"
  responsiveLayout="scroll"
  [paginator]="true"
  [rows]="5">

  <ng-template pTemplate="header">
    <tr>
      <th>Device</th>
      <th>Type</th>
      <th>Status</th>
      <th>Location</th>
      <th>Vendor</th>
    </tr>
  </ng-template>

  <ng-template pTemplate="body" let-device>
    <tr>
      <td>{{ device.deviceName }}</td>
      <td>{{ device.deviceType }}</td>
      <td>{{ device.status }}</td>
      <td>{{ device.location }}</td>
      <td>{{ device.vendor }}</td>
    </tr>
  </ng-template>

</p-table>
